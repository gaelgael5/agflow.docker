name: Build & publish images

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_all:
        description: "Build both images regardless of paths"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.f.outputs.backend }}
      frontend: ${{ steps.f.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: f
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  build-backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || inputs.force_all }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/gaelgael5/agflow-backend:latest
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

  build-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || inputs.force_all }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/gaelgael5/agflow-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max
