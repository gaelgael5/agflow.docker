services:
  postgres:
    image: postgres:16-alpine
    container_name: agflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?postgres password required}
      POSTGRES_DB: ${POSTGRES_DB:-agflow}
    # Expose on LAN so local Windows dev can run tests against this DB.
    # Machine de test only — NOT safe for real production.
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      retries: 5
    networks: [agflow]

  backend:
    image: agflow-backend:latest
    container_name: agflow-backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Where the backend will mirror dockerfiles + roles on disk (bind-mounted
      # below so the host can inspect / backup / rsync the content).
      AGFLOW_DATA_DIR: /app/data
      # Host-side path of the same directory. Needed because bind mounts on
      # child containers are resolved by the host Docker daemon, not by the
      # backend container. Used to auto-prefix relative mount sources.
      AGFLOW_DATA_HOST_DIR: /root/agflow.docker/data
    # Mount host Docker socket so the backend can run `docker build` via aiodocker
    # (Module 1 — dockerfile builds). Test machine only; not safe for multi-tenant prod.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - /root/.ssh/backend_key:/app/.ssh/backend_key:ro
    depends_on:
      postgres: { condition: service_healthy }
    networks: [agflow]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      retries: 5

  frontend:
    image: agflow-frontend:latest
    container_name: agflow-frontend
    restart: unless-stopped
    depends_on: [backend]
    networks: [agflow]

  caddy:
    image: caddy:2-alpine
    container_name: agflow-caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [frontend, backend]
    networks: [agflow]

# http://192.168.10.158:8081/
  pgweb:
    image: sosedoff/pgweb:latest
    container_name: agflow-pgweb
    restart: unless-stopped
    environment:
      PGWEB_DATABASE_URL: postgresql://${POSTGRES_USER:-agflow}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-agflow}?sslmode=disable
    depends_on:
      postgres: { condition: service_healthy }
    ports:
      - "8081:8081"
    networks: [agflow]



volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  agflow:
    driver: bridge
