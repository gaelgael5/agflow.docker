services:
  postgres:
    image: postgres:16-alpine
    container_name: agflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?postgres password required}
      POSTGRES_DB: ${POSTGRES_DB:-agflow}
    # Expose on LAN so local Windows dev can run tests against this DB.
    # Machine de test only — NOT safe for real production.
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      retries: 5
    networks: [agflow]

  backend:
    image: agflow-backend:latest
    container_name: agflow-backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Where the backend will mirror dockerfiles + roles on disk (bind-mounted
      # below so the host can inspect / backup / rsync the content).
      AGFLOW_DATA_DIR: /app/data
      # Host-side path of the same directory. Needed because bind mounts on
      # child containers are resolved by the host Docker daemon, not by the
      # backend container. Used to auto-prefix relative mount sources.
      AGFLOW_DATA_HOST_DIR: /root/agflow.docker/data
    # Mount host Docker socket so the backend can run `docker build` via aiodocker
    # (Module 1 — dockerfile builds). Test machine only; not safe for multi-tenant prod.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    depends_on:
      postgres: { condition: service_healthy }
    networks: [agflow]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      retries: 5

  frontend:
    image: agflow-frontend:latest
    container_name: agflow-frontend
    restart: unless-stopped
    depends_on: [backend]
    networks: [agflow]

  caddy:
    image: caddy:2-alpine
    container_name: agflow-caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [frontend, backend]
    networks: [agflow]

  dozzle-agent:
    image: amir20/dozzle:latest
    container_name: dozzle-agent
    restart: unless-stopped
    command: agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "7007:7007"
    networks:
      - agflow

  wetty:
    image: wettyoss/wetty:latest
    container_name: agflow-wetty
    restart: unless-stopped
    command: --base /terminal --force-ssh --port 3000 --ssh-key /ssh/wetty_key
    volumes:
      - /root/.ssh:/ssh:ro
    network_mode: host

  portainer-agent:
    image: portainer/agent:latest
    container_name: portainer-agent
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    ports:
      - "9001:9001"
    networks:
      - agflow

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  agflow:
    driver: bridge
