networks:
  agflowdocker-net:
    driver: bridge

services:
  # ── Monitoring Agents (connect to central on 192.168.10.63) ──

  dozzle-agent:
    image: amir20/dozzle:latest
    container_name: dozzle-agent
    restart: unless-stopped
    command: agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "7007:7007"
    networks:
      - agflowdocker-net

  netdata-agent:
    image: netdata/netdata:stable
    container_name: netdata-agent
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/os-release:/host/etc/os-release:ro
      - ./netdata-stream.conf:/etc/netdata/stream.conf:ro
    environment:
      NETDATA_CLAIM_TOKEN: "b32733cf-a882-47a6-9009-0f7f1bd08d67"
      DOCKER_HOST: unix:///var/run/docker.sock
    ports:
      - "19999:19999"
    networks:
      - agflowdocker-net

  portainer-agent:
    image: portainer/agent:latest
    container_name: portainer-agent
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    ports:
      - "9001:9001"
    networks:
      - agflowdocker-net
