server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        # Resolveur dynamique : Docker DNS interne (127.0.0.11), cache 10s,
        # IPv6 desactive pour eviter les AAAA warnings.
        # L'utilisation d'une variable ($backend_upstream) au lieu d'un nom
        # statique force nginx a resoudre le DNS AU RUNTIME et pas au boot,
        # ce qui evite le crash "host not found in upstream backend" quand
        # le service backend Swarm n'est pas encore DNS-resolvable au demarrage.
        # Si le backend tombe, nginx renvoie 502 (recoverable) au lieu de
        # crasher et tomber dans la limite max_attempts du restart_policy.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed assets (index-<hash>.js, index-<hash>.css, fonts) are
    # immutable — safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # index.html must always revalidate so that a new frontend build
    # (new hashed asset URLs) is picked up on the next navigation.
    # Without this, users keep seeing the previous version until they
    # hard-refresh.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
