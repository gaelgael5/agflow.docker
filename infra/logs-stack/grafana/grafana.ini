##################### Grafana Configuration — agflow logs stack #####################
# Référence : https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/
# Auth OIDC Keycloak via realm `yoops` (security.yoops.org).
# Client roles attendus côté Keycloak (resource_access.grafana.roles) : admin, editor, viewer.

[server]
root_url = https://log.yoops.org
serve_from_sub_path = false

[security]
# Le mot de passe admin technique vient de la variable d'env GF_SECURITY_ADMIN_PASSWORD
# (compose). Sert uniquement de secours en cas d'indisponibilité Keycloak.
admin_user = admin
cookie_secure = true
cookie_samesite = lax

[users]
# Empêche la création d'utilisateurs locaux depuis l'UI ; tous les users viennent de Keycloak.
allow_sign_up = false
auto_assign_org_role = Viewer

[auth]
disable_login_form = false  # Garde le login local pour le compte admin de secours
oauth_auto_login = false

[auth.generic_oauth]
enabled = true
name = Keycloak
allow_sign_up = true
client_id = grafana
# client_secret vient de GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET (env)
scopes = openid email profile
auth_url = https://security.yoops.org/realms/yoops/protocol/openid-connect/auth
token_url = https://security.yoops.org/realms/yoops/protocol/openid-connect/token
api_url = https://security.yoops.org/realms/yoops/protocol/openid-connect/userinfo
signout_redirect_url = https://security.yoops.org/realms/yoops/protocol/openid-connect/logout?post_logout_redirect_uri=https%3A%2F%2Flog.yoops.org%2Flogin&client_id=grafana
# IMPORTANT : resource_access.grafana.roles est dans l'ID token mais PAS dans
# /userinfo par défaut (le mapper "client roles" du scope `roles` a Add-to-userinfo=OFF).
# use_id_token=true fait que Grafana lit les claims depuis l'ID token au lieu de /userinfo.
use_id_token = true
# Mapping des client roles Keycloak -> rôles Grafana
role_attribute_path = contains(resource_access.grafana.roles[*], 'admin') && 'Admin' || contains(resource_access.grafana.roles[*], 'editor') && 'Editor' || 'Viewer'
role_attribute_strict = false

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false

[log]
mode = console
level = info
