[global]
repo1-path=/var/lib/pgbackrest
repo1-retention-full=7
repo1-cipher-type=none
compress-type=zst
compress-level=3
process-max=2
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest
start-fast=y

[agflow]
pg1-path=/var/lib/postgresql/data
pg1-port=5432
pg1-user=postgres
pg1-database=postgres
